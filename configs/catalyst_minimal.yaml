model:
  model_name: gpt2
  reward_model_name: distilbert-base-uncased
  max_length: 256

data:
  max_prompt_length: 128
  max_response_length: 128
  train_batch_size: 1
  eval_batch_size: 1

training:
  reward_learning_rate: 2.0e-5
  reward_num_epochs: 1
  ppo_learning_rate: 1.0e-6
  ppo_num_epochs: 1
  ppo_batch_size: 1
  ppo_mini_batch_size: 1
  ppo_max_grad_norm: 1.0
  grpo_learning_rate: 1.0e-6
  grpo_num_epochs: 1
  grpo_max_grad_norm: 1.0
  grpo_entropy_coef: 0.01
  dpo_learning_rate: 1.0e-6
  dpo_num_epochs: 1
  dpo_max_grad_norm: 1.0
  dpo_weight_decay: 0.01
  generation_max_length: 128
  generation_temperature: 0.7
  generation_top_p: 0.9

verl:
  rollout_batch_size: 1
  rollout_max_length: 128
  train_batch_size: 1
  train_mini_batch_size: 1
  gradient_accumulation_steps: 1
  ppo_epochs: 1
  ppo_clip_eps: 0.2
  ppo_target_kl: 0.01
  ppo_adaptive_kl: false
  ppo_kl_penalty: 0.0

grpo:
  group_size: 2
  rollout_batch_size: 1
  rollout_max_length: 128
  temperature: 0.7
  top_p: 0.9
  update_epochs: 1
  clip_eps: 0.2
  kl_penalty: 0.0
  reward_clip: 5.0
  advantage_eps: 1.0e-8

dpo:
  beta: 0.1
  label_smoothing: 0.0

system:
  device: cuda
  mixed_precision: "no"
  dataloader_num_workers: 0
  pin_memory: true
  gradient_checkpointing: false
  ref_policy_dtype: float16
  logging_steps: 1
  save_steps: 1000
  eval_steps: 100000
  output_dir: outputs
  reward_model_dir: outputs/reward_model
  ppo_model_dir: outputs/ppo_model
  rlhf_model_dir: outputs/ppo_model
  grpo_model_dir: outputs/grpo_model
  dpo_model_dir: outputs/dpo_model
  logs_dir: logs

experiment:
  experiment_name: catalyst_minimal_compare
  eval_prompts_sample_size: 8
  eval_generation_max_length: 128
  eval_batch_size: 1
  max_train_prompts: 16
  max_train_pairs: 16
  max_val_pairs: 8
  max_test_pairs: 8
  seed: 42
